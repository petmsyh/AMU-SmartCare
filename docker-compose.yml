version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: amu_smartcare_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: amu_smartcare
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: amu_smartcare_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/amu_smartcare
      JWT_SECRET: change_me_in_production_very_long_secret_key
      JWT_EXPIRES_IN: 7d
      PORT: 5000
      PAYMENT_MODE: mock
      PLATFORM_COMMISSION_RATE: '0.10'
      AUTO_RELEASE_HOURS: '24'
      NODE_ENV: development
    ports:
      - '5000:5000'
    volumes:
      - ./backend/src:/app/src

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: amu_smartcare_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - '3000:3000'

volumes:
  postgres_data:
